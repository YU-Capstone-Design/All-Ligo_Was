spring:
  application:
    name: All-Ligo_WAS
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret-key: ${JWT_KEY}
  issuer: ${JWT_ISSUER}
  expiration:
    access-token: ${JWT_AT_EXPIRATION}
    refresh-token: ${JWT_RT_EXPIRATION}

agent:
  server:
    url: ${AGENT_SERVER_URL:http://localhost:8000}