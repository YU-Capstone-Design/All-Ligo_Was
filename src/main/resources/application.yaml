spring:
  application:
    name: All-Ligo_WAS
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret-key: ${JWT_KEY}
  issuer: ${JWT_ISSUER}
  expiration:
    access-token: ${JWT_AT_EXPIRATION}
    refresh-token: ${JWT_RT_EXPIRATION}

agent:
  server:
    url: ${AGENT_SERVER_URL:http://localhost:8000}

app:
  backend:
    verify-url: ${BACKEND_VERIFY_URL}
  frontend:
    verify-complete-url: ${FRONTEND_VERIFY_COMPLETE_URL}
  image:
    default-profile-url: ${DEFAULT_PROFILE_IMAGE_URL}

server:
  port: ${SERVER_PORT:8080}